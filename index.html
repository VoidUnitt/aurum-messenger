<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0088cc">
    <title>Aurum | Золотой мессенджер</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Основной контент -->
        <div class="main-content">
            <!-- Список чатов -->
            <div class="chats-screen active" id="chatsScreen">
                <div class="header">
                    <div class="header-left">
                        <div class="avatar" id="profileAvatar">
                            <img src="https://via.placeholder.com/40/0088cc/ffffff?text=A" alt="">
                        </div>
                        <div class="user-name" id="userName">Алексей</div>
                    </div>
                    <div class="header-right">
                        <button class="header-btn" id="searchBtn">
                            <i class="fas fa-search"></i>
                        </button>
                        <button class="header-btn" id="newChatHeaderBtn">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                </div>
                
                <div class="search-bar" id="searchBar" style="display: none;">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Поиск">
                    <button id="closeSearchBtn">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <div class="chats-list" id="chatsList">
                    <!-- Чаты будут здесь -->
                </div>
            </div>
            
            <!-- Экран чата -->
            <div class="chat-screen" id="chatScreen">
                <div class="chat-header">
                    <button class="back-btn" id="backBtn">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="chat-header-info" id="chatHeaderInfo">
                        <div class="chat-header-avatar" id="chatHeaderAvatar">👤</div>
                        <div>
                            <div class="chat-header-name" id="chatHeaderName">Выберите чат</div>
                            <div class="chat-header-status" id="chatHeaderStatus">онлайн</div>
                        </div>
                    </div>
                    <div class="chat-header-actions">
                        <button class="chat-action-btn" id="chatCallBtn">
                            <i class="fas fa-phone"></i>
                        </button>
                        <button class="chat-action-btn" id="chatMenuBtn">
                            <i class="fas fa-ellipsis-v"></i>
                        </button>
                    </div>
                </div>
                
                <div class="messages-container" id="messagesContainer">
                    <div class="messages" id="messages">
                        <div class="empty-chat">
                            <i class="fas fa-comments"></i>
                            <p>Выберите чат, чтобы начать общение</p>
                        </div>
                    </div>
                </div>
                
                <div class="input-area">
                    <button class="attach-btn" id="attachMsgBtn">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <div class="message-input-wrapper">
                        <input type="text" id="messageInput" placeholder="Сообщение">
                        <button class="emoji-btn" id="emojiMsgBtn">
                            <i class="far fa-smile"></i>
                        </button>
                    </div>
                    <button class="send-btn" id="sendMsgBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <button class="nav-item active" data-screen="chats">
                <i class="fas fa-comment"></i>
                <span>Чаты</span>
            </button>
            <button class="nav-item" data-screen="calls">
                <i class="fas fa-phone"></i>
                <span>Звонки</span>
            </button>
            <button class="nav-item" data-screen="contacts">
                <i class="fas fa-address-book"></i>
                <span>Контакты</span>
            </button>
            <button class="nav-item" data-screen="settings">
                <i class="fas fa-user"></i>
                <span>Настройки</span>
            </button>
        </div>
    </div>
    
    <!-- Экран звонков -->
    <div class="screen" id="callsScreen">
        <div class="screen-header">
            <h2>Звонки</h2>
        </div>
        <div class="calls-list">
            <div class="call-item">
                <div class="call-avatar">👨</div>
                <div class="call-info">
                    <div class="call-name">Анна</div>
                    <div class="call-time">Вчера, 14:30</div>
                </div>
                <div class="call-type incoming">
                    <i class="fas fa-phone-alt"></i>
                </div>
            </div>
            <div class="call-item">
                <div class="call-avatar">👩</div>
                <div class="call-info">
                    <div class="call-name">Максим</div>
                    <div class="call-time">Пн, 10:15</div>
                </div>
                <div class="call-type outgoing">
                    <i class="fas fa-phone-alt"></i>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Экран контактов -->
    <div class="screen" id="contactsScreen">
        <div class="screen-header">
            <h2>Контакты</h2>
            <button class="add-contact-btn" id="addContactBtn">
                <i class="fas fa-user-plus"></i>
            </button>
        </div>
        <div class="contacts-list" id="contactsList">
            <!-- Контакты будут здесь -->
        </div>
    </div>
    
    <!-- Экран настроек -->
    <div class="screen" id="settingsScreen">
        <div class="screen-header">
            <h2>Настройки</h2>
        </div>
        <div class="settings-list">
            <div class="settings-item">
                <div class="settings-icon">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="settings-info">
                    <div class="settings-title">Мой профиль</div>
                    <div class="settings-sub" id="profileName">Алексей</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="settings-item" id="themeSetting">
                <div class="settings-icon">
                    <i class="fas fa-palette"></i>
                </div>
                <div class="settings-info">
                    <div class="settings-title">Оформление</div>
                    <div class="settings-sub" id="themeLabel">Светлая тема</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="settings-item">
                <div class="settings-icon">
                    <i class="fas fa-bell"></i>
                </div>
                <div class="settings-info">
                    <div class="settings-title">Уведомления и звуки</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="settings-item">
                <div class="settings-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="settings-info">
                    <div class="settings-title">Конфиденциальность</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="settings-item">
                <div class="settings-icon">
                    <i class="fas fa-database"></i>
                </div>
                <div class="settings-info">
                    <div class="settings-title">Данные и память</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="settings-item">
                <div class="settings-icon">
                    <i class="fas fa-language"></i>
                </div>
                <div class="settings-info">
                    <div class="settings-title">Язык</div>
                    <div class="settings-sub">Русский</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>
    </div>
    
    <!-- Модалка нового чата -->
    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новый чат</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="newChatName" placeholder="Имя контакта">
                <div class="avatar-picker">
                    <label>Аватар:</label>
                    <div class="avatar-options">
                        <div class="avatar-opt" data-emoji="👤">👤</div>
                        <div class="avatar-opt" data-emoji="👩">👩</div>
                        <div class="avatar-opt" data-emoji="👨">👨</div>
                        <div class="avatar-opt" data-emoji="⭐">⭐</div>
                        <div class="avatar-opt" data-emoji="🔥">🔥</div>
                        <div class="avatar-opt" data-emoji="💎">💎</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel">Отмена</button>
                <button class="btn-create" id="createNewChat">Создать</button>
            </div>
        </div>
    </div>
    
    <!-- Модалка профиля -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Мой профиль</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="profile-avatar-large">
                    <div class="large-avatar">A</div>
                </div>
                <input type="text" id="profileNameInput" placeholder="Ваше имя">
                <div class="theme-selector">
                    <label>Тема:</label>
                    <select id="themeSelectModal">
                        <option value="light">Светлая</option>
                        <option value="dark">Тёмная</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-save" id="saveProfileBtn">Сохранить</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
