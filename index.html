<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e1a">
    <title>Aurum</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark">
    <div class="app">
        <!-- Экран авторизации -->
        <div class="screen" id="authScreen">
            <div class="auth-container">
                <div class="auth-logo">
                    <i class="fas fa-crown"></i>
                    <h1>Aurum</h1>
                    <p>защищённый мессенджер</p>
                </div>
                
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Вход</button>
                    <button class="auth-tab" data-tab="register">Регистрация</button>
                </div>
                
                <div class="auth-form active" id="loginForm">
                    <input type="text" id="loginPhone" placeholder="Email или телефон">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button id="loginBtn">Войти</button>
                </div>
                
                <div class="auth-form" id="registerForm">
                    <input type="text" id="regName" placeholder="Ваше имя">
                    <input type="text" id="regPhone" placeholder="Email или телефон">
                    <input type="password" id="regPassword" placeholder="Пароль">
                    <button id="registerBtn">Создать аккаунт</button>
                </div>
            </div>
        </div>

        <!-- Основной интерфейс -->
        <div class="screen" id="mainScreen" style="display: none;">
            <div class="main-container">
                <!-- Чаты -->
                <div class="panel active" id="chatsPanel">
                    <div class="header">
                        <div class="avatar" id="profileAvatar">A</div>
                        <span class="user-name" id="userName">Загрузка...</span>
                        <div class="header-actions">
                            <button class="icon-btn" id="newChatBtn"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchChats" placeholder="Поиск">
                    </div>
                    <div class="chats-list" id="chatsList"></div>
                </div>

                <!-- Чат -->
                <div class="panel" id="chatPanel">
                    <div class="chat-header">
                        <button class="back-btn" id="backToChats"><i class="fas fa-arrow-left"></i></button>
                        <div class="chat-user">
                            <div class="chat-avatar" id="chatAvatar">👤</div>
                            <div>
                                <div class="chat-name" id="chatName">Чат</div>
                                <div class="chat-status" id="chatStatus">в сети</div>
                            </div>
                        </div>
                    </div>
                    <div class="messages-container" id="messagesContainer">
                        <div class="messages" id="messages"></div>
                    </div>
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="Сообщение">
                        <button class="send-btn" id="sendBtn">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>

                <!-- Контакты -->
                <div class="panel" id="contactsPanel">
                    <div class="header">
                        <span class="panel-title">Контакты</span>
                        <button class="icon-btn" id="addContactBtn"><i class="fas fa-plus"></i></button>
                    </div>
                    <div class="contacts-list" id="contactsList"></div>
                </div>

                <!-- Настройки -->
                <div class="panel" id="settingsPanel">
                    <div class="header">
                        <span class="panel-title">Настройки</span>
                    </div>
                    <div class="settings-list">
                        <div class="setting-item" id="editProfileBtn">
                            <i class="fas fa-user"></i>
                            <span>Имя профиля</span>
                            <span id="profileName">Загрузка...</span>
                        </div>
                        <div class="setting-item" id="logoutBtn">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Выйти</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Нижняя навигация -->
            <div class="bottom-nav">
                <button class="nav-btn active" data-panel="chats">
                    <i class="fas fa-comment"></i>
                </button>
                <button class="nav-btn" data-panel="contacts">
                    <i class="fas fa-address-book"></i>
                </button>
                <button class="nav-btn" data-panel="settings">
                    <i class="fas fa-user"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Модалка нового чата -->
    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <h3>Новый чат</h3>
            <input type="text" id="contactPhone" placeholder="Email или телефон">
            <button id="findUserBtn">Найти</button>
            <div id="foundUser"></div>
            <button class="close-modal">Отмена</button>
        </div>
    </div>

    <!-- Модалка профиля -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>Редактировать</h3>
            <input type="text" id="editName" placeholder="Ваше имя">
            <button id="saveNameBtn">Сохранить</button>
            <button class="close-modal">Отмена</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
