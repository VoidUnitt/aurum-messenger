<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0088cc">
    <title>Aurum Messenger</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Экран авторизации -->
        <div class="screen" id="authScreen">
            <div class="auth-container">
                <div class="auth-logo">
                    <i class="fas fa-crown"></i>
                    <h1>Aurum</h1>
                </div>
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Вход</button>
                    <button class="auth-tab" data-tab="register">Регистрация</button>
                </div>
                <div class="auth-form active" id="loginForm">
                    <input type="text" id="loginPhone" placeholder="Телефон или email">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button id="loginBtn">Войти</button>
                </div>
                <div class="auth-form" id="registerForm">
                    <input type="text" id="regName" placeholder="Ваше имя">
                    <input type="text" id="regPhone" placeholder="Телефон">
                    <input type="password" id="regPassword" placeholder="Пароль">
                    <button id="registerBtn">Зарегистрироваться</button>
                </div>
            </div>
        </div>

        <!-- Основной интерфейс (после входа) -->
        <div class="screen" id="mainScreen" style="display: none;">
            <div class="main-container">
                <!-- Список чатов -->
                <div class="chats-panel active" id="chatsPanel">
                    <div class="header">
                        <div class="header-left">
                            <div class="avatar" id="profileAvatar">👤</div>
                            <span class="user-name" id="userName">Загрузка...</span>
                        </div>
                        <div class="header-right">
                            <button class="icon-btn" id="searchBtn"><i class="fas fa-search"></i></button>
                            <button class="icon-btn" id="newChatBtn"><i class="fas fa-edit"></i></button>
                        </div>
                    </div>
                    <div class="chats-list" id="chatsList"></div>
                </div>

                <!-- Экран чата -->
                <div class="chat-panel" id="chatPanel">
                    <div class="chat-header">
                        <button class="back-btn" id="backToChats"><i class="fas fa-arrow-left"></i></button>
                        <div class="chat-info" id="chatInfo">
                            <div class="chat-avatar" id="chatAvatar">👤</div>
                            <div>
                                <div class="chat-name" id="chatName">Чат</div>
                                <div class="chat-status" id="chatStatus">онлайн</div>
                            </div>
                        </div>
                        <div class="chat-actions">
                            <button class="icon-btn" id="audioCallBtn"><i class="fas fa-phone"></i></button>
                        </div>
                    </div>
                    <div class="messages-container" id="messagesContainer">
                        <div class="messages" id="messages"></div>
                    </div>
                    <div class="input-area">
                        <div class="message-input-wrapper">
                            <input type="text" id="messageInput" placeholder="Сообщение">
                            <button class="emoji-btn" id="emojiBtn"><i class="far fa-smile"></i></button>
                        </div>
                        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>

                <!-- Поиск пользователей -->
                <div class="search-panel" id="searchPanel" style="display: none;">
                    <div class="header">
                        <button class="back-btn" id="closeSearch"><i class="fas fa-arrow-left"></i></button>
                        <input type="text" id="searchUserInput" placeholder="Поиск по номеру телефона">
                    </div>
                    <div class="search-results" id="searchResults"></div>
                </div>
            </div>

            <!-- Нижняя навигация -->
            <div class="bottom-nav">
                <button class="nav-btn active" data-panel="chats"><i class="fas fa-comment"></i><span>Чаты</span></button>
                <button class="nav-btn" data-panel="contacts"><i class="fas fa-address-book"></i><span>Контакты</span></button>
                <button class="nav-btn" data-panel="settings"><i class="fas fa-user"></i><span>Профиль</span></button>
            </div>
        </div>

        <!-- Контакты -->
        <div class="panel" id="contactsPanel" style="display: none;">
            <div class="header">
                <h2>Контакты</h2>
                <button class="icon-btn" id="addContactBtn"><i class="fas fa-user-plus"></i></button>
            </div>
            <div class="contacts-list" id="contactsList"></div>
        </div>

        <!-- Настройки -->
        <div class="panel" id="settingsPanel" style="display: none;">
            <div class="header">
                <h2>Профиль</h2>
            </div>
            <div class="settings-list">
                <div class="setting-item" id="editProfileBtn">
                    <i class="fas fa-user-circle"></i>
                    <span>Имя</span>
                    <span id="profileName">Загрузка...</span>
                    <i class="fas fa-chevron-right"></i>
                </div>
                <div class="setting-item" id="themeItem">
                    <i class="fas fa-palette"></i>
                    <span>Тема</span>
                    <span id="themeValue">Светлая</span>
                    <i class="fas fa-chevron-right"></i>
                </div>
                <div class="setting-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Выйти</span>
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалки -->
    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <h3>Новый чат</h3>
            <input type="text" id="contactPhone" placeholder="Номер телефона">
            <button id="findUserBtn">Найти пользователя</button>
            <div id="foundUser"></div>
            <button class="close-modal">Отмена</button>
        </div>
    </div>

    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>Редактировать профиль</h3>
            <input type="text" id="editName" placeholder="Ваше имя">
            <button id="saveNameBtn">Сохранить</button>
            <button class="close-modal">Отмена</button>
        </div>
    </div>

    <div class="modal" id="callModal">
        <div class="call-modal-content">
            <div id="callAvatar">📞</div>
            <div id="callName"></div>
            <div id="callStatus">Вызов...</div>
            <button id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
